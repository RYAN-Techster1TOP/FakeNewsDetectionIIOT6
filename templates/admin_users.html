{% extends "base.html" %}
{% block content %}
<div class="admin-container">
<h2 class="admin-title">👥Manage Users</h2>
<table class="admin-table">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody>
{% for user in users %}
<tr>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>
<td>
{% if user.role != "admin" %}
<a href="/delete-user/{{user._id}}" class="delete-btn">Delete</a>
{% else %}
<span class="admin-badge">Admin</span>
{% endif %}
</td>
</tr>
{% endfor %}
</tbody>
</table>
<div class="admin-nav">
    <a href="/admin" class="btn-primary left-btn">⬅ Dashboard</a>
    <a href="/" class="btn-secondary right-btn">🏠Analyze→</a>
</div>
</div>
{% endblock %}
